document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

169,60,.16),rgba(134,192,63,.1));border:1px solid rgba(244,169,60,.2)\">\n      <div style=\"position:absolute;top:-60px;left:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(244,169,60,.3),transparent 70%);pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative\">\n        <span class=\"tp-ms\" style=\"font-size:40px;color:#F4A93C\">wb_sunny<\u002Fspan>\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(28px,3.6vw,44px);letter-spacing:-.03em;margin:14px 0 12px\">Sunshine in your mailbox<\u002Fh2>\n        <p style=\"color:#C7BDAB;font-size:17px;line-height:1.55;max-width:480px;margin:0 auto 28px\">Seasonal harvests, new powder launches, and exclusive offers — delivered weekly.<\u002Fp>\n        <form id=\"tp-news\" style=\"display:flex;gap:10px;max-width:460px;margin:0 auto;flex-wrap:wrap;justify-content:center\">\n          <input type=\"email\" required=\"\" placeholder=\"you@email.com\" style=\"flex:1;min-width:220px;background:rgba(20,17,12,.6);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:15px 22px;color:#F5EFE3;font-size:15px;font-family:inherit;outline:none\">\n          <button type=\"submit\" style=\"background:#F4A93C;color:#14110C;border:none;font-weight:700;font-size:15px;padding:15px 30px;border-radius:999px;cursor:pointer;font-family:inherit;transition:transform .2s ease\" style-hover=\"transform:translateY(-2px)\">Subscribe<\u002Fbutton>\n        <\u002Fform>\n        <div id=\"tp-news-ok\" style=\"display:none;color:#86C03F;font-weight:600;margin-top:16px\">Thanks — welcome to the harvest list! 🌱<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT ============ -->\n  <section id=\"tp-contact\" style=\"background:#1A160F;border-top:1px solid rgba(255,255,255,.06)\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:90px 32px\">\n      <div data-reveal=\"\" style=\"text-align:center;margin-bottom:54px\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.12em;color:#F4A93C;margin-bottom:12px\">LET'S WORK TOGETHER<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(32px,4vw,52px);letter-spacing:-.03em;line-height:1\">Sourcing, samples, or just curious?<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:40px\" data-tp-contact=\"\">\n        <div data-reveal=\"\" style=\"display:flex;flex-direction:column;gap:18px\">\n          <a href=\"mailto:hello@tropella.com\" style=\"display:flex;align-items:center;gap:16px;background:#211C14;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px;text-decoration:none;transition:border-color .25s ease\" style-hover=\"border-color:rgba(244,169,60,.4)\">\n            <span style=\"width:48px;height:48px;border-radius:13px;background:rgba(244,169,60,.13);display:flex;align-items:center;justify-content:center\"><span class=\"tp-ms\" style=\"font-size:24px;color:#F4A93C\">mail<\u002Fspan><\u002Fspan>\n            <div><div style=\"font-size:13px;color:#A89E8C\">Email<\u002Fdiv><div style=\"font-weight:600;font-size:16px;color:#F5EFE3\">hello@tropella.com<\u002Fdiv><\u002Fdiv>\n          <\u002Fa>\n          <a href=\"https://wa.me/1234567890\" style=\"display:flex;align-items:center;gap:16px;background:#211C14;border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px;text-decoration:none;transition:border-color .25s ease\" style-hover=\"border-color:rgba(134,192,63,.4)\">\n            <span style=\"width:48px;height:48px;border-radius:13px;background:rgba(134,192,63,.13);display:flex;align-items:center;justify-content:center\"><span class=\"tp-ms\" style=\"font-size:24px;color:#86C03F\">chat<\u002Fspan><\u002Fspan>\n            <div><div style=\"font-size:13px;color:#A89E8C\">WhatsApp<\u002Fdiv><div style=\"font-weight:600;font-size:16px;color:#F5EFE3\">+1 234 567 890<\u002Fdiv><\ or:#9C927F;font-size:14.5px\">Mon–Fri, 9–6 (GMT+6)<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1280px;margin:40px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap\">\n      <span style=\"color:#7A715F;font-size:13.5px\">© 2026 Tropella Organic Atelier. Hand-picked tropical excellence.<\u002Fspan>\n      <div style=\"display:flex;gap:16px;color:#7A715F\"><span class=\"tp-ms\" style=\"font-size:19px\">verified_user<\u002Fspan><span class=\"tp-ms\" style=\"font-size:19px\">eco<\u002Fspan><span class=\"tp-ms\" style=\"font-size:19px\">public<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const root = this.el || document;\n    const q = (s) => root.querySelector(s);\n    const qa = (s) => Array.from(root.querySelectorAll(s));\n\n    // --- Sticky nav background on scroll ---\n    const nav = q('#tp-nav');\n    const onScroll = () => {\n      if (!nav) return;\n      if (window.scrollY > 30) {\n        nav.style.background = 'rgba(20,17,12,.85)';\n        nav.style.backdropFilter = 'blur(14px)';\n        nav.style.borderBottomColor = 'rgba(255,255,255,.08)';\n      } else {\n        nav.style.background = 'transparent';\n        nav.style.backdropFilter = 'none';\n        nav.style.borderBottomColor = 'transparent';\n      }\n    };\n    onScroll();\n    window.addEventListener('scroll', onScroll, { passive: true });\n    this._onScroll = onScroll;\n\n    // --- Mobile menu toggle (DOM only, no re-render) ---\n    const burger = q('#tp-burger');\n    const mobile = q('#tp-mobile');\n    if (burger && mobile) {\n      burger.addEventListener('click', () => {\n        const open = mobile.style.display === 'flex';\n        mobile.style.display = open ? 'none' : 'flex';\n        burger.textContent = open ? 'menu' : 'close';\n      });\n      mobile.querySelectorAll('a').forEach((a) => a.addEventListener('click', () => {\n        mobile.style.display = 'none';\n        burger.textContent = 'menu';\n      }));\n    }\n\n    // --- Responsive collapse of nav links ---\n    const navlinks = q('#tp-navlinks');\n    const applyResponsive = () => {\n      const w = window.innerWidth;\n      const narrow = w < 880;\n      if (navlinks) navlinks.style.display = narrow ? 'none' : 'flex';\n      if (burger) burger.style.display = narrow ? 'inline-block' : 'none';\n      if (!narrow && mobile) { mobile.style.display = 'none'; if (burger) burger.textContent = 'menu'; }\n      // stack grids on small screens\n      const stack = (sel, cols) => { const e = q(sel); if (e) e.style.gridTemplateColumns = narrow ? '1fr' : cols; };\n      stack('[data-tp-herogrid]', '1.05fr .95fr');\n      stack('[data-tp-dual]', '1fr 1fr');\n      stack('[data-tp-wholesale]', '1fr 1fr');\n      stack('[data-tp-about]', '.9fr 1.1fr');\n      stack('[data-tp-contact]', '.85fr 1.15fr');\n      const rg = q('[data-tp-range]');\n      if (rg) {\n        const wide = w >= 1000, mid = w >= 700 && w < 1000;\n        rg.style.gridTemplateColumns = wide ? 'repeat(6,1fr)' : (mid ? 'repeat(2,1fr)' : '1fr');\n        rg.style.gridAutoRows = w < 700 ? '230px' : '244px';\n        Array.from(rg.children).forEach((t) => {\n          const c = t.getAttribute('data-span-c') || '1';\n          const r = t.getAttribute('data-span-r') || '1';\n          if (wide) { t.style.gridColumn = 'span ' + c; t.style.gridRow = 'span ' + r; }\n          else if (mid) { t.style.gridColumn = (c === '4' ? 'span 2' : 'span 1'); t.style.gridRow = (r === '2' ? 'span 2' : 'span 1'); }\n          else { t.style.gridColumn = 'auto'; t.style.gridRow = (r === '2' ? 'span 2' : 'span 1'); }\n        });\n      }\n      const pr = q('[data-tp-process]'); if (pr) pr.style.gridTemplateColumns = w < 700 ? '1fr' : (w < 1000 ? '1fr 1fr' : 'repeat(4,1fr)');\n      const wf = q('[data-tp-wsfeatures]'); if (wf) wf.style.gridTemplateColumns = w < 700 ? '1fr 1fr' : 'repeat(4,1fr)';\n      const ts = q('[data-tp-testi]'); if (ts) ts.style.gridTemplateColumns = w < 700 ? '1fr' : (w < 1000 ? '1fr 1fr' : 'repeat(3,1fr)');\n      const en = q('[data-tp-enjoy]'); if (en) en.style.gridTemplateColumns = w < 700 ? '1fr 1fr' : 'repeat(4,1fr)';\n      const ft = q('[data-tp-footer]'); if (ft) ft.style.gridTemplateColumns = w < 760 ? '1fr 1fr' : '1.6fr 1fr 1fr 1fr';\n    };\n    applyResponsive();\n    window.addEventListener('resize', applyResponsive);\n    this._onResize = applyResponsive;\n\n    // --- Scroll reveal ---\n    const items = qa('[data-reveal]');\n    items.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1)';\n      el.style.willChange = 'opacity, transform';\n    });\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((entry, i) => {\n          if (entry.isIntersecting) {\n            const el = entry.target;\n            const sibs = Array.from(el.parentElement ? el.parentElement.querySelectorAll(':scope > [data-reveal]') : [el]);\n            const idx = Math.max(0, sibs.indexOf(el));\n            const delay = Math.min(idx * 90, 360);\n            setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'none'; }, delay);\n            io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      items.forEach((el) => io.observe(el));\n      this._io = io;\n    } else {\n      items.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    }\n\n    // --- Form handlers ---\n    const news = q('#tp-news');\n    if (news) news.addEventListener('submit', (e) => {\n      e.preventDefault();\n      news.style.display = 'none';\n      const ok = q('#tp-news-ok'); if (ok) ok.style.display = 'block';\n    });\n    const form = q('#tp-form');\n    if (form) form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      Array.from(form.children).forEach((el) => { if (el.id !== 'tp-form-ok') el.style.display = 'none'; });\n      const ok = q('#tp-form-ok'); if (ok) ok.style.display = 'block';\n    });\n  }\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._io) this._io.disconnect();\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
